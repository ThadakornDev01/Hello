<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>404 Not Found</title>
    <link rel="stylesheet" href="404.css">
    <style>
        /* ส่วนปุ่มวิ่งหนีปกติ */
        .contant_box_404 {
            position: relative;
            min-height: 300px;
        }

        #runawayBtn {
            position: absolute;
            white-space: nowrap;
            left: 50%;
            bottom: 20px;
            transform: translateX(-50%);
            transition: all 0.2s ease-out;
            z-index: 1000;
            background-color: #28a745;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
        }

        /* เอฟเฟกต์ระเบิดหายไป */
        .explode {
            animation: explodeAnim 0.4s forwards;
            pointer-events: none;
        }

        @keyframes explodeAnim {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); filter: blur(5px); opacity: 0.5; }
            100% { transform: scale(2); filter: blur(20px); opacity: 0; }
        }

        /* --- ปรับปรุง Jump Scare: นิ่งและเต็มจอ 100% --- */
        #jumpscare {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100vw;
            height: 100vh;
            background-color: black;
            z-index: 999999;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        #ghostImg {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: fill; /* ยืดให้เต็มจอ 100% ไม่ทิ้งขอบ */
            border: none;
        }
    </style>
</head>
<body style="margin:0; padding:0;">

    <section class="page_404">
        <div class="container">
            <div class="four_zero_four_bg">
                <h1>Error</h1>
            </div>
            <div class="contant_box_404">
                <h3>ตรวจพบความผิดปกติของระบบ</h3>
                <p>ระบบพบว่าคุณมีสิทธิ์เข้าถึงฟีเจอร์ลับ อยากดูอะไร 'เจ๊งๆ' กว่าคนอื่นไหม? ถ้าใจถึง</p>
                <p>"ขอบคุณที่สละเวลาชีวิต 10 วินาทีมาดูความว่างเปล่า"</p>
                <p>"ที่บอกว่าเจ๊ง คือ 'เจ๊งมาก' ที่คุณกดเข้ามาหาอะไรที่ไม่มีอยู่จริง..."</p>
                <a href="/Test404/index.html" class="link_404" id="runawayBtn">[ กดเพื่อกลับไปหน้าหลัก ]</a>
            </div>
        </div>
    </section>

    <div id="jumpscare">
        <img id="ghostImg" src="/download.jpg" alt="GHOST">
        <audio id="screamSound" src="/frogo_the_froggy-jumpscare-sound-for-fnat-burning-memories-for-mixed-222937.mp3" preload="auto"></audio>
    </div>

    <script>
        const button = document.getElementById('runawayBtn');
        let fails = 0;
        let isGameOver = false;

        const runAway = () => {
            if (fails >= 15 || isGameOver) return; 
            const maxWidth = window.innerWidth - button.offsetWidth;
            const maxHeight = window.innerHeight - button.offsetHeight;

            button.style.position = 'fixed';
            button.style.bottom = 'auto';
            button.style.left = `${Math.random() * maxWidth}px`;
            button.style.top = `${Math.random() * maxHeight}px`;
            button.style.transform = 'none';
        };

        button.addEventListener('click', (e) => {
            e.preventDefault();
            if (fails >= 15) {
                isGameOver = true;
                button.classList.add('explode');
                
                setTimeout(() => {
                    const jumpscare = document.getElementById('jumpscare');
                    const scream = document.getElementById('screamSound');
                    
                    jumpscare.style.display = 'block';
                    
                    scream.volume = 1.0;
                    scream.play().catch(err => {
                        console.log("Audio play failed");
                    });

                    if (navigator.vibrate) {
                        navigator.vibrate([500, 100, 500]);
                    }

                    setTimeout(() => {
                        window.location.href = '/Test404/index.html';
                    }, 3500);
                }, 400);
            }
        });

        document.addEventListener('mousedown', (e) => {
            if (isGameOver) return;
            if (e.target.id !== 'runawayBtn') {
                fails++;
                if (fails === 15) {
                    button.style.transition = 'all 0.5s ease';
                    button.innerText = "[ อ๊ะ! ยอมให้กดก็ได้ ]";
                    button.style.backgroundColor = "gold";
                    button.style.color = "black";
                }
            }
        });

        document.addEventListener('mousemove', (e) => {
            if (fails >= 15 || isGameOver) return;
            const btnRect = button.getBoundingClientRect();
            const btnCenterX = btnRect.left + btnRect.width / 2;
            const btnCenterY = btnRect.top + btnRect.height / 2;
            const distance = Math.sqrt(Math.pow(e.clientX - btnCenterX, 2) + Math.pow(e.clientY - btnCenterY, 2));
            if (distance < 100) runAway();
        });

        button.addEventListener('touchstart', (e) => {
            if (fails < 15) {
                e.preventDefault();
                runAway();
            }
        });
    </script>
</body>
</html>
